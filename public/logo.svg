<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#ff0088"/>
<stop offset="100%" stop-color="#000000"/>
</linearGradient>

<mask id="stripes">

<rect width="100%" height="100%" fill="black"/>

<rect height="45%" width="100%" fill="white"/>
<rect height="8%" y="48%" width="100%" fill="white"/>
<rect height="6%" y="62%" width="100%" fill="white"/>
<rect height="4%" y="76%" width="100%" fill="white"/>
<rect height="3%" y="88%" width="100%" fill="white"/>

<rect height="3%" y="98%" width="100%" fill="white"/>
</mask>

</defs>

<circle cx="100" cy="100" r="100" fill="url(#grad)" mask="url(#stripes)"/>

</svg>